<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grilla TV - 24 horas + YouTube</title>
    <style>
        :root {
            --bg-body: #1a1a1a;
            --bg-grilla: #000;
            --bg-encabezado: #222;
            --bg-canal: #181818;
            --bg-reproductor: #000;
            --bg-anuncio: #111;
            --texto: white;
            --texto-anuncio: #888;
            --borde: #333;
            --borde-grilla: #555;
            --borde-anuncio: #444;
            --sombra: rgba(0, 0, 0, 0.8);
            --linea-tiempo: red;
        }

        body.modo-claro {
            --bg-body: #e8e8e8;
            --bg-grilla: #fff;
            --bg-encabezado: #e0e0e0;
            --bg-canal: #f0f0f0;
            --bg-reproductor: #e0e0e0;
            --bg-anuncio: #f5f5f5;
            --texto: #111;
            --texto-anuncio: #666;
            --borde: #ccc;
            --borde-grilla: #999;
            --borde-anuncio: #ccc;
            --sombra: rgba(0, 0, 0, 0.2);
            --linea-tiempo: #d00;
        }

        body.alto-contraste {
            --bg-body: #000;
            --bg-grilla: #000;
            --bg-encabezado: #000;
            --bg-canal: #000;
            --bg-reproductor: #000;
            --bg-anuncio: #000;
            --texto: #fff;
            --texto-anuncio: #ff0;
            --borde: #fff;
            --borde-grilla: #ff0;
            --borde-anuncio: #ff0;
            --sombra: none;
            --linea-tiempo: #ff0;
        }

        body.alto-contraste .programa {
            border: 2px solid #fff;
            text-shadow: none;
            box-shadow: none;
            background: #000 !important;
            color: #fff;
        }

        body.alto-contraste .programa:hover {
            outline: 2px solid #ff0;
            box-shadow: 0 0 15px #ff0;
        }

        body.alto-contraste .linea-tiempo {
            background: #ff0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: var(--bg-body);
            color: var(--texto);
            display: flex;
            flex-direction: row;
            height: 100vh;
            overflow: hidden;
            transition: background 0.3s, color 0.3s;
            justify-content: center;
            align-items: stretch;
            gap: 0;
        }

        .panel-anuncio {
            flex: 0 0 160px;
            background: var(--bg-anuncio);
            border: 1px dashed var(--borde-anuncio);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--texto-anuncio);
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            position: relative;
            overflow-y: auto;
            padding: 20px 10px;
            gap: 20px;
        }

        .panel-anuncio .anuncio-placeholder {
            width: 120px;
            height: 250px;
            border: 2px dashed var(--borde-anuncio);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 13px;
            opacity: 0.7;
            background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(128, 128, 128, 0.03) 10px, rgba(128, 128, 128, 0.03) 20px);
            transition: all 0.3s;
        }

        .contenedor-central {
            flex: 1 1 auto;
            max-width: 1300px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            position: relative;
            min-width: 700px;
        }

        .reproductor-container {
            flex: 0 0 45vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-reproductor);
            border-bottom: 2px solid var(--borde-grilla);
            position: relative;
            transition: background 0.3s, border-color 0.3s;
            margin: 4px 4px 0 4px;
            border-radius: 12px 12px 0 0;
        }

        .reproductor-container iframe {
            width: 65%;
            height: 85%;
            border-radius: 12px;
            box-shadow: 0 0 20px var(--sombra);
            max-width: 800px;
        }

        .overlay-reproductor {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            z-index: 20;
            text-align: center;
            padding: 20px;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .overlay-reproductor.oculto {
            opacity: 0;
            pointer-events: none;
        }

        .overlay-reproductor .mensaje-principal {
            font-size: clamp(24px, 5vw, 48px);
            font-weight: bold;
            text-shadow: 0 0 30px rgba(0, 0, 0, 0.9);
        }

        .overlay-reproductor .sub-mensaje {
            font-size: clamp(12px, 1.8vw, 20px);
            opacity: 0.7;
            margin-top: 10px;
        }

        .error-reproductor {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: var(--texto);
            background: rgba(0, 0, 0, 0.8);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            z-index: 25;
        }

        .error-reproductor a {
            color: var(--linea-tiempo);
            text-decoration: underline;
            font-size: 18px;
        }

        .indicador-auto {
            position: absolute;
            top: 12px;
            right: 16px;
            background: #4CAF50;
            color: white;
            padding: 5px 12px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: bold;
            z-index: 30;
            opacity: 0.85;
            letter-spacing: 1px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            transition: all 0.3s;
            pointer-events: none;
        }

        .contenedor-grilla {
            flex: 1 1 auto;
            overflow: hidden;
            border: 2px solid var(--borde-grilla);
            border-radius: 0 0 12px 12px;
            background: var(--bg-grilla);
            box-shadow: 0 0 20px var(--sombra);
            transition: background 0.3s, border-color 0.3s;
            margin: 0 4px 4px 4px;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .grilla-container {
            flex: 1;
            overflow: auto;
            position: relative;
            display: flex;
        }

        .columna-canales {
            position: sticky;
            left: 0;
            z-index: 10;
            background: var(--bg-canal);
            width: 180px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--borde);
        }

        .canal-nombre {
            height: 90px;
            display: flex;
            align-items: center;
            padding-left: 12px;
            font-weight: bold;
            border-bottom: 1px solid var(--borde);
            background: var(--bg-canal);
            justify-content: flex-start;
            font-size: 14px;
        }

        .encabezado-canal {
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            background: var(--bg-encabezado);
            border-bottom: 1px solid var(--borde);
            position: sticky;
            top: 0;
            z-index: 12;
            font-size: 14px;
        }

        .grilla-wrapper {
            flex: 1;
            overflow: visible;
            height: fit-content;
        }

        .grilla {
            display: grid;
            grid-template-columns: repeat(48, 75px);
            grid-template-rows: 55px repeat(50, 90px);
            width: max-content;
            position: relative;
        }

        .celda {
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--borde);
            padding: 0;
            margin: 0;
            overflow: visible;
            transition: border-color 0.3s;
        }

        .encabezado {
            background: var(--bg-encabezado);
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 11;
            transition: background 0.3s;
            font-size: 13px;
        }

        .programa {
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            z-index: 2;
            box-sizing: border-box;
            overflow: hidden;
            text-align: center;
            padding: 3px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-shadow: 0 0 6px var(--sombra);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
            white-space: normal;
            word-break: break-word;
        }

        .programa:hover {
            transform: scale(1.03);
            box-shadow: 0 0 18px rgba(255, 255, 255, 0.4);
            z-index: 5;
        }

        .programa div {
            pointer-events: none;
        }

        .programa .titulo {
            font-weight: bold;
            font-size: 1.15em;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        .programa .presentadores {
            font-size: 0.85em;
            opacity: 0.85;
            margin: 1px 0;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        .programa .horario {
            font-size: 0.8em;
            opacity: 0.9;
        }

        .linea-tiempo {
            position: absolute;
            top: 0;
            width: 2px;
            height: 100%;
            background: var(--linea-tiempo);
            z-index: 6;
            pointer-events: none;
            opacity: 0.9;
            transition: background 0.3s;
        }

        .reloj {
            position: fixed;
            top: 10px;
            left: 175px;
            z-index: 100;
            padding: 6px 16px;
            background: var(--bg-encabezado);
            color: var(--texto);
            border: 2px solid var(--borde-grilla);
            border-radius: 20px;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 2px 8px var(--sombra);
            transition: all 0.3s;
            letter-spacing: 1px;
        }

        .clima {
            position: fixed;
            top: 55px;
            left: 175px;
            z-index: 100;
            padding: 5px 12px;
            background: var(--bg-encabezado);
            color: var(--texto);
            border: 2px solid var(--borde-grilla);
            border-radius: 20px;
            font-size: 14px;
            box-shadow: 0 2px 8px var(--sombra);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .boton-modo {
            position: fixed;
            top: 10px;
            right: 175px;
            z-index: 100;
            padding: 6px 12px;
            border: 2px solid var(--borde-grilla);
            background: var(--bg-encabezado);
            color: var(--texto);
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 2px 8px var(--sombra);
            font-size: 13px;
        }

        .boton-modo:hover {
            transform: scale(1.05);
        }

        .boton-ac {
            position: fixed;
            bottom: 20px;
            left: 175px;
            z-index: 100;
            padding: 8px 14px;
            border: 2px solid var(--borde-grilla);
            background: var(--bg-encabezado);
            color: var(--texto);
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 2px 8px var(--sombra);
            font-size: 15px;
        }

        .boton-ac:hover {
            transform: scale(1.05);
        }

        .dropdown-cotizacion {
            position: fixed;
            top: 55px;
            right: 175px;
            z-index: 100;
        }

        .dropdown-cotizacion .btn-dropdown {
            padding: 6px 14px;
            border: 2px solid var(--borde-grilla);
            background: var(--bg-encabezado);
            color: var(--texto);
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 2px 8px var(--sombra);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .dropdown-cotizacion .btn-dropdown:hover {
            transform: scale(1.05);
        }

        .dropdown-cotizacion .panel-cotizacion {
            display: none;
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            min-width: 280px;
            max-width: 400px;
            max-height: 60vh;
            overflow-y: auto;
            background: var(--bg-encabezado);
            color: var(--texto);
            border: 2px solid var(--borde-grilla);
            border-radius: 16px;
            padding: 12px 16px;
            box-shadow: 0 8px 24px var(--sombra);
            font-size: 13px;
            line-height: 1.7;
            white-space: normal;
            transition: all 0.3s;
            text-align: left;
        }

        .dropdown-cotizacion .panel-cotizacion.mostrar {
            display: block;
        }

        .dropdown-cotizacion .panel-cotizacion .cotizacion-item {
            border-bottom: 1px solid var(--borde);
            padding: 4px 0;
        }
        .dropdown-cotizacion .panel-cotizacion .cotizacion-item:last-child {
            border-bottom: none;
        }

        .error-grilla {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--texto);
            background: var(--bg-grilla);
            text-align: center;
            padding: 20px;
            font-size: clamp(28px, 8vw, 60px);
        }

        .dropdown-cotizacion .panel-cotizacion::-webkit-scrollbar {
            width: 6px;
        }
        .dropdown-cotizacion .panel-cotizacion::-webkit-scrollbar-track {
            background: var(--bg-body);
            border-radius: 8px;
        }
        .dropdown-cotizacion .panel-cotizacion::-webkit-scrollbar-thumb {
            background: var(--borde-grilla);
            border-radius: 8px;
        }

        @media (max-width: 1100px) {
            .panel-anuncio {
                flex: 0 0 80px;
                font-size: 10px;
                padding: 10px 4px;
            }
            .panel-anuncio .anuncio-placeholder {
                width: 60px;
                height: 120px;
                font-size: 9px;
            }
            .contenedor-central {
                min-width: 500px;
                max-width: 100%;
            }
            .reloj,
            .clima,
            .boton-ac {
                left: 95px;
            }
            .boton-modo,
            .dropdown-cotizacion {
                right: 95px;
            }
            .indicador-auto {
                top: 6px;
                right: 8px;
                font-size: 10px;
                padding: 3px 8px;
            }
        }

        @media (max-width: 700px) {
            .panel-anuncio {
                display: none;
            }
            .contenedor-central {
                min-width: 100%;
            }
            .reloj,
            .clima,
            .boton-ac {
                left: 10px;
            }
            .boton-modo,
            .dropdown-cotizacion {
                right: 10px;
            }
            .reproductor-container iframe {
                width: 90%;
                height: 75%;
            }
            .columna-canales {
                width: 120px;
            }
            .indicador-auto {
                top: 4px;
                right: 6px;
                font-size: 9px;
                padding: 2px 6px;
            }
        }
    </style>
</head>

        function obtenerClima() {
            const climaDiv = document.getElementById('clima');
            if (!navigator.geolocation) {
                climaDiv.innerHTML = '🌡️ N/A';
                return;
            }
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                try {
                    const response = await fetch(
                        `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                    if (!response.ok) throw new Error("Error de red");
                    const data = await response.json();
                    const temp = data.current_weather.temperature;
                    const code = data.current_weather.weathercode;
                    const desc = weatherCodeMap[code] || 'Desconocido';
                    const emoji = weatherEmojiMap[code] || '🌈';
                    climaDiv.innerHTML = `${emoji} ${temp}°C - ${desc}`;
                } catch (error) {
                    climaDiv.innerHTML = '🌡️ N/A';
                }
            }, (error) => {
                climaDiv.innerHTML = '🌡️ N/A';
            }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 600000 });
        }

                .then(response => response.json())
                .then(data => {
                    let texto = '';
                    data.forEach(item => {
                        const nombre = item.nombre || item.casa || 'Desconocido';
                        const compra = item.compra !== undefined ? item.compra.toFixed(2) : 'N/D';
                        const venta = item.venta !== undefined ? item.venta.toFixed(2) : 'N/D';
                        texto +=
                            `<div class="cotizacion-item">${nombre}: Compra $${compra} | Venta $${venta}</div>`;
                    });
                    return fetch('https://dolarapi.com/v1/cotizaciones')
                        .then(response => response.json())
                        .then(cotizaciones => {
                            function buscarCotizacion(nombres) {
                                return cotizaciones.find(item => {
                                    const nombre = (item.nombre || '').toLowerCase();
                                    const casa = (item.casa || '').toLowerCase();
                                    return nombres.some(n => nombre.includes(n) || casa.includes(
                                        n));

                                `<div class="cotizacion-item">Euro: Compra € ${euro.compra.toFixed(2)} | Venta € ${euro.venta.toFixed(2)}</div>`;

        function extraerIDYouTube(url) {
            if (!url) return null;
            const patrones = [
                /(?:https?:\/\/)?(?:www\.)?youtube\.com\/watch\?v=([^&\s]+)/,
                /(?:https?:\/\/)?(?:www\.)?youtu\.be\/([^?\s]+)/,
                /(?:https?:\/\/)?(?:www\.)?youtube\.com\/embed\/([^/?\s]+)/,
                /(?:https?:\/\/)?(?:www\.)?youtube\.com\/live\/([^/?\s]+)/,
                /(?:https?:\/\/)?(?:www\.)?youtube\.com\/shorts\/([^/?\s]+)/,
                /(?:https?:\/\/)?(?:m\.)?youtube\.com\/watch\?v=([^&\s]+)/
            ];
            for (const patron of patrones) {
                const match = url.match(patron);
                if (match) return match[1];
            }
            return null;
        }

        // Busca y reproduce el programa actual según el horario para el canal por defecto
        function reproducirProgramaSegunHorario(hora, minutos) {
            if (!datosProgramacionActual || datosProgramacionActual.length === 0) return;

            const horaDecimal = hora + minutos / 60;
            const canalDefault = CANAL_AUTO_DEFAULT;

            // Filtrar programas del canal por defecto
            const programasCanal = datosProgramacionActual.filter(p => p.canal === canalDefault);

            let programaActual = null;
            for (const prog of programasCanal) {
                const inicio = prog.horaInicio;
                const fin = inicio + prog.duracion;
                // Manejar wrap-around de medianoche
                if (fin > 24) {
                    if (horaDecimal >= inicio || horaDecimal < (fin - 24)) {
                        programaActual = prog;
                        break;
                    }
                } else {
                    if (horaDecimal >= inicio && horaDecimal < fin) {
                        programaActual = prog;
                        break;
                    }
                }
            }

            if (!programaActual) return;

            // Si ya reprodujimos este programa automáticamente, no hacer nada
            if (programaReproducidoAutomaticamente === programaActual) return;

            programaReproducidoAutomaticamente = programaActual;

            if (programaActual.url && programaActual.url.trim() !== '') {
                const esYouTube = extraerIDYouTube(programaActual.url);
                if (esYouTube) {
                    reproducirVideo(programaActual.url);
                } else {
                    // URL no es de YouTube, no podemos embeberla, mostrar mensaje
                    mostrarOverlay('Programa actual: ' + programaActual.titulo,
                        'El enlace no es un video de YouTube embebible');
                }
            } else {
                mostrarNoDisponible();
            }
        }

        function ajustarTextoProgramas() {
            document.querySelectorAll('.programa:not(.sin-programacion)').forEach(prog => {
                const titulo = prog.querySelector('.titulo');
                if (!titulo) return;
                const blockWidth = prog.clientWidth;
                const titleText = titulo.textContent;
                const titleLength = titleText.length;
                const idealFontSize = Math.min(10 * escalaActual, blockWidth / (titleLength * 0.55));
                const minFontSize = 5;
                const startSize = Math.max(minFontSize, Math.min(10 * escalaActual, idealFontSize));
                prog.style.fontSize = startSize + 'px';
                let intentos = 0;
                while (titulo.scrollWidth > titulo.clientWidth && intentos < 20) {
                    const currentSize = parseFloat(prog.style.fontSize);
                    if (currentSize <= minFontSize) break;
                    prog.style.fontSize = (currentSize - 0.5) + 'px';
                    intentos++;
                }
            });
        }

        function iniciarActualizacionAutomatica() {
            if (intervaloActualizacion) clearInterval(intervaloActualizacion);

            function actualizar() {
                verificarCambioDia();
                const ahora = new Date();
                const h = ahora.getHours();
                const m = ahora.getMinutes();
                actualizarLineaTiempo(h, m);

                // Lógica de autoreproducción (solo si está en modo automático)
                if (modoAutomatico) {
                    reproducirProgramaSegunHorario(h, m);
                } else if (ultimaInteraccion > 0 && (Date.now() - ultimaInteraccion) > TIEMPO_REACTIVACION) {
                    // Reactivar modo automático después de inactividad prolongada
                    modoAutomatico = true;
                    programaReproducidoAutomaticamente = null;
                    actualizarIndicadorAuto();
                    console.log('Modo automático reactivado por inactividad');
                    reproducirProgramaSegunHorario(h, m);
                }
            }
            actualizar();
            const ahora = new Date();
            const msHastaProximoMinuto = (60 - ahora.getSeconds()) * 1000 - ahora.getMilliseconds();
            setTimeout(() => {
                actualizar();
                intervaloActualizacion = setInterval(actualizar, 60000);
            }, msHastaProximoMinuto);
        }

        function horaADecimal(valor) {
            if (typeof valor === 'number') return valor;
            const str = String(valor).trim();
            if (str.includes(':')) {
                const partes = str.split(':');
                const horas = parseInt(partes[0], 10) || 0;
                const minutos = parseInt(partes[1], 10) || 0;
                return horas + minutos / 60;
            }
            return parseFloat(str);
        }

        function parseCSV(texto) {
            const lineas = texto.split(/\r?\n/);
            const datos = [];
            let inicioDatos = 0;
            const primera = lineas[0].trim().toLowerCase();
            if (primera.startsWith('canal') && (primera.includes('horainicio') || primera.includes('horaFin')))
        inicioDatos = 1;
            for (let i = inicioDatos; i < lineas.length; i++) {
                const linea = lineas[i].trim();
                if (linea === '') continue;
                const partes = [];
                let actual = '';
                let entreComillas = false;
                for (let j = 0; j < linea.length; j++) {
                    const ch = linea[j];
                    if (ch === '"') {
                        entreComillas = !entreComillas;
                    } else if (ch === ',' && !entreComillas) {
                        partes.push(actual.trim());
                        actual = '';
                    } else {
                        actual += ch;
                    }
                }
                partes.push(actual.trim());
                if (partes.length < 5) continue;
                const canalNombre = partes[0];
                const canal = nombreACanal(canalNombre);
                if (canal === null || canal < 1 || canal > 50) continue;
                const horaInicio = horaADecimal(partes[1]);
                if (isNaN(horaInicio)) continue;
                const horaFinStr = partes[2].replace(/^fin:/i, '').trim();
                const horaFinDecimal = horaADecimal(horaFinStr);
                if (isNaN(horaFinDecimal)) continue;
                let duracion = horaFinDecimal - horaInicio;
                if (duracion < 0) duracion += 24;
                if (duracion <= 0) continue;
                const titulo = partes[3].replace(/^"|"$/g, '');
                if (!titulo) continue;
                const presentadores = partes[4].replace(/^"|"$/g, '');
                const programa = { canal, horaInicio, duracion, horaFin: horaFinDecimal, titulo, presentadores };
                if (partes.length >= 6 && partes[5] !== '') programa.color = partes[5];
                if (partes.length >= 7 && partes[6] !== '') programa.url = partes[6];
                datos.push(programa);
            }
            return datos;
        }

        function ajustarProgramasConsecutivos(programas) {
            programas.forEach(prog => {
                prog.horaInicioOriginal = prog.horaInicio;
                prog.horaFinOriginal = prog.horaFin;
            });

            const porCanal = {};
            programas.forEach(prog => {
                const c = prog.canal;
                if (!porCanal[c]) porCanal[c] = [];
                porCanal[c].push(prog);
            });

            const TOLERANCIA = 0.001;
            const AJUSTE = -0.25;

            for (const canal in porCanal) {
                const lista = porCanal[canal];
                lista.sort((a, b) => a.horaInicio - b.horaInicio);

                for (let i = 0; i < lista.length - 1; i++) {
                    const actual = lista[i];
                    const siguiente = lista[i + 1];

                    if (Math.abs(actual.horaFin - siguiente.horaInicio) < TOLERANCIA) {
                        actual.horaFin += AJUSTE;
                        siguiente.horaInicio -= AJUSTE;
                        actual.duracion = actual.horaFin - actual.horaInicio;
                        siguiente.duracion = siguiente.horaFin - siguiente.horaInicio;

                        if (actual.duracion <= 0) {
                            actual.horaFin = actual.horaInicio + 0.01;
                            actual.duracion = 0.01;
                        }
                        if (siguiente.duracion <= 0) {
                            siguiente.horaInicio = siguiente.horaFin - 0.01;
                            siguiente.duracion = 0.01;
                        }
                    }
                }
            }
        }

        function renderizarGrilla(datos, horaActual, minutosActual) {
            const grilla = document.getElementById("grilla");
            const columnaCanales = document.getElementById("columnaCanales");
            grilla.innerHTML = "";
            columnaCanales.innerHTML = "";

            const canales = 50;
            const anchoMediaHoraBase = 75;
            const anchoHoraBase = anchoMediaHoraBase * 2;
            const alturaFila = 90;
            const mediaHoras = 48;
            const limiteFin = 23.5;
            const EPSILON = 0.001;

            const programasPorCanal = {};
            for (let c = 1; c <= canales; c++) programasPorCanal[c] = [];

            datos.forEach(prog => {
                const canal = prog.canal;
                if (canal < 1 || canal > canales) return;
                const inicioOrig = parseFloat(prog.horaInicio);
                const duracionOrig = parseFloat(prog.duracion);
                if (isNaN(inicioOrig) || isNaN(duracionOrig) || inicioOrig < 0) return;

                const finOrig = inicioOrig + duracionOrig;

                const segmentos = [];
                if (finOrig > 24) {
                    segmentos.push({ inicio: inicioOrig, fin: 24 });
                    segmentos.push({ inicio: 0, fin: finOrig - 24 });
                } else {
                    segmentos.push({ inicio: inicioOrig, fin: finOrig });
                }

                segmentos.forEach(seg => {
                    let segInicio = seg.inicio;
                    let segFin = seg.fin;

                    if (segInicio >= limiteFin) return;
                    if (segFin > limiteFin) segFin = limiteFin;

                    const segDuracion = segFin - segInicio;
                    if (segDuracion <= 0) return;

                    programasPorCanal[canal].push({
                        ...prog,
                        inicio: segInicio,
                        duracion: segDuracion,
                        fin: segFin
                    });
                });
            });

            for (let c = 1; c <= canales; c++) {
                if (programasPorCanal[c].length === 0) {
                    programasPorCanal[c].push({
                        inicio: 0,
                        duracion: limiteFin,
                        fin: limiteFin,
                        titulo: "SIN PROGRAMACIÓN",
                        presentadores: "",
                        color: null,
                        url: null,
                        sinProgramacion: true
                    });
                }
            }

            const pistasPorCanal = {};
            for (let c = 1; c <= canales; c++) {
                const programas = programasPorCanal[c];
                programas.sort((a, b) => a.inicio - b.inicio);
                const pistas = [];
                const asignacion = [];
                programas.forEach(prog => {
                    let pistaAsignada = -1;
                    for (let i = 0; i < pistas.length; i++) {
                        if (pistas[i] <= prog.inicio || Math.abs(pistas[i] - prog.inicio) < EPSILON) {
                            pistaAsignada = i;
                            break;
                        }
                    }
                    if (pistaAsignada === -1) {
                        pistaAsignada = pistas.length;
                        pistas.push(prog.fin);
                    } else {
                        pistas[pistaAsignada] = prog.fin;
                    }
                    asignacion.push({ programa: prog, pista: pistaAsignada });
                });
                pistasPorCanal[c] = { asignacion, numPistas: pistas.length };
            }

            let canalesHTML = '<div class="encabezado-canal"></div>';
            for (let canal = 1; canal <= canales; canal++) {
                let nombre = "Canal " + canal;
                if (canal === 1) nombre = "Gelatina";
                else if (canal === 2) nombre = "FutuRock";
                else if (canal === 3) nombre = "Olga";
                else if (canal === 4) nombre = "LuzuTV";
                else if (canal === 5) nombre = "Vorterix";
                else if (canal === 6) nombre = "Disney Channel";
                else if (canal === 7) nombre = "Cartoon Network";
                else if (canal === 8) nombre = "Warner";
                else if (canal === 9) nombre = "HBO";
                else if (canal === 10) nombre = "Cinecanal";
                canalesHTML += `<div class="canal-nombre">${nombre}</div>`;
            }
            columnaCanales.innerHTML = canalesHTML;

            let grillaHTML = '';
            for (let m = 0; m < mediaHoras; m++) {
                const hora = Math.floor(m / 2);
                const minuto = m % 2 === 0 ? '00' : '30';
                grillaHTML +=
                    `<div class="celda encabezado">${hora.toString().padStart(2,"0")}:${minuto}</div>`;
            }

            for (let canal = 1; canal <= canales; canal++) {
                const info = pistasPorCanal[canal] || { asignacion: [], numPistas: 0 };
                const { asignacion, numPistas } = info;
                const alturaPorPista = numPistas > 0 ? alturaFila / numPistas : alturaFila;

                let contenedorHtml =
                    `<div class="celda" style="grid-column: 1 / -1; position: relative; padding:0; overflow:visible; height:${alturaFila}px;">`;
                contenedorHtml +=
                    `<div style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; display:flex; flex-direction:row;">`;
                for (let m = 0; m < mediaHoras; m++) {
                    contenedorHtml +=
                        `<div class="linea-divisoria" style="border-left:1px solid var(--borde); height:100%; width:${anchoMediaHoraBase}px; flex-shrink:0; margin-left:-0.03px;"></div>`;
                }
                contenedorHtml += `</div>`;

                asignacion.forEach(({ programa, pista }) => {
                    const { titulo, presentadores, inicio, fin, duracion, color, url, sinProgramacion,
                        horaInicioOriginal, horaFinOriginal } = programa;
                    const tieneURL = url && url.trim() !== '';

                    let colorFondo;
                    if (sinProgramacion || !tieneURL) {
                        colorFondo = "#444";
                    } else {
                        colorFondo = color || "#444";
                    }

                    let onclickAttr;
                    if (tieneURL) {
                        const esYouTube = extraerIDYouTube(url);
                        onclickAttr =
                            `onclick="clicPrograma(event, '${url.replace(/'/g, "\\'")}', true, ${esYouTube ? 'true' : 'false'})"`;
                    } else if (sinProgramacion) {
                        onclickAttr = '';
                    } else {
                        onclickAttr = `onclick="clicPrograma(event, null, false, false)"`;
                    }

                    const inicioMostrar = horaInicioOriginal !== undefined ? horaInicioOriginal :
                        inicio;
                    const finMostrar = horaFinOriginal !== undefined ? horaFinOriginal : fin;

                    const inicioHoras = Math.floor(inicioMostrar);
                    const inicioMinutos = Math.round((inicioMostrar - inicioHoras) * 60);
                    const finHoras = Math.floor(finMostrar);
                    const finMinutos = Math.round((finMostrar - finHoras) * 60);
                    const inicioStr =
                        `${inicioHoras.toString().padStart(2,"0")}:${inicioMinutos.toString().padStart(2,"0")}`;
                    const finStr =
                        `${finHoras.toString().padStart(2,"0")}:${finMinutos.toString().padStart(2,"0")}`;

                    const presentadoresHtml = (!sinProgramacion && presentadores) ?
                        `<div class="presentadores">${presentadores}</div>` : '';
                    const horarioHtml = !sinProgramacion ?
                        `<div class="horario">${inicioStr} - ${finStr}</div>` : '';

                    const left = inicio * anchoHoraBase;
                    const width = duracion * anchoHoraBase;
                    const top = pista * alturaPorPista;
                    const height = alturaPorPista;

                    const fontSizePlaceholder = sinProgramacion ? Math.min(height * 0.5, width * 0.15) :
                        (10 * escalaActual);
                    const claseExtra = sinProgramacion ? ' sin-programacion' : '';

                    contenedorHtml += `
                    <div class="programa${claseExtra}" style="position:absolute; left:${left}px; top:${top}px; width:${width}px; height:${height}px; background:${colorFondo}; font-size:${fontSizePlaceholder}px; pointer-events:${sinProgramacion ? 'none' : 'auto'};"
                         data-inicio="${inicio}" data-duracion="${duracion}" data-pista="${pista}" data-numpistas="${numPistas}" ${onclickAttr}>
                        <div class="titulo">${titulo}</div>
                        ${presentadoresHtml}
                        ${horarioHtml}
                    </div>
                  `;
                });

                contenedorHtml += `</div>`;
                grillaHTML += contenedorHtml;
            }

            grilla.innerHTML = grillaHTML;

            crearLineaTiempo();
            actualizarLineaTiempo(horaActual, minutosActual);
            aplicarZoom();

            // Siempre mostrar el overlay al inicio porque empezamos en modo manual
            if (!modoAutomatico) {
                mostrarOverlay('Seleccione un programa', 'Haga clic en cualquier programa de la grilla');
            }
        }

        function alternarModo() {
            const body = document.body;
            const boton = document.getElementById('botonModo');
            if (body.classList.contains('modo-oscuro')) {
                body.classList.remove('modo-oscuro');
                body.classList.add('modo-claro');
                boton.innerHTML = '🌙 Modo Oscuro';
            } else {
                body.classList.remove('modo-claro');
                body.classList.add('modo-oscuro');
                boton.innerHTML = '☀️ Modo Claro';
            }
        }

        function alternarAltoContraste() {
            const body = document.body;
            body.classList.toggle('alto-contraste');
            if (body.classList.contains('alto-contraste')) {
                localStorage.setItem('altoContraste', 'true');
            } else {
                localStorage.removeItem('altoContraste');
            }
        }

        function obtenerEscalaMinima() {
            const container = document.getElementById('grillaContainer');
            if (!container) return 0.3;
            const anchoDisponible = container.clientWidth;
            const anchoTotalBase = 180 + 48 * 75;
            const escala = (anchoDisponible - 10) / anchoTotalBase;
            return Math.max(0.2, Math.min(1, escala));
        }

        function verificarCambioDia() {
            if (cargandoProgramacion) return;
            const ahora = new Date();
            const formateador = new Intl.DateTimeFormat('es-AR', {
                timeZone: 'America/Argentina/Buenos_Aires',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            });
            const partes = formateador.formatToParts(ahora);
            const dia = partes.find(p => p.type === 'day').value;
            const mes = partes.find(p => p.type === 'month').value;
            const anio = partes.find(p => p.type === 'year').value;
            const fechaActualStr = `${anio}-${mes}-${dia}`;
            if (ultimaFechaCargaStr && fechaActualStr !== ultimaFechaCargaStr) {
                console.log(
                    `Cambio de día detectado: ${ultimaFechaCargaStr} → ${fechaActualStr}. Recargando programación...`);
                cargarProgramacion();
            }
        }

        async function cargarProgramacion() {
            if (cargandoProgramacion) return;
            cargandoProgramacion = true;

            let hora, minutos, dia, mes, anio;
            try {
                const response = await fetch('https://worldtimeapi.org/api/timezone/America/Argentina/Buenos_Aires');
                const data = await response.json();
                const datetime = new Date(data.datetime);
                hora = datetime.getHours();
                minutos = datetime.getMinutes();
                dia = datetime.getDate();
                mes = datetime.getMonth();
                anio = datetime.getFullYear();
            } catch (error) {
                const ahora = new Date();
                hora = ahora.getHours();
                minutos = ahora.getMinutes();
                dia = ahora.getDate();
                mes = ahora.getMonth();
                anio = ahora.getFullYear();
            }

            ultimaFechaCargaStr =
                `${anio}-${String(mes + 1).padStart(2, '0')}-${String(dia).padStart(2, '0')}`;
            const nombreMes = meses[mes];
            const ruta = `./Programación/${nombreMes}/${dia}.csv`;

            let datos;
            try {
                const respuesta = await fetch(ruta);
                if (!respuesta.ok) throw new Error(`HTTP ${respuesta.status}`);
                const texto = await respuesta.text();
                datos = parseCSV(texto);
                if (datos.length === 0) throw new Error("Archivo vacío o sin programas válidos");
                console.log(`Programación cargada desde ${ruta}`);
                ajustarProgramasConsecutivos(datos);
            } catch (error) {
                console.warn(`No se pudo cargar ${ruta}, usando datos de ejemplo.`, error);
                datos = JSON.parse(JSON.stringify(programacionEjemplo));
            }

            if (datos) {
                // Guardar datos globalmente para autoreproducción
                datosProgramacionActual = datos;

                // Empezar en modo manual, sin reproducción automática
                modoAutomatico = false;
                programaReproducidoAutomaticamente = null;
                ultimaInteraccion = 0; // Sin interacción previa
                actualizarIndicadorAuto();

                const escalaMin = obtenerEscalaMinima();
                if (escalaActual > 1) escalaActual = 1;
                if (escalaActual < escalaMin) escalaActual = escalaMin;
                renderizarGrilla(datos, hora, minutos);
                iniciarActualizacionAutomatica();
            } else {
                mostrarErrorGrilla();
            }

            obtenerClima();
            obtenerCotizacion();

            if (localStorage.getItem('altoContraste') === 'true') {
                document.body.classList.add('alto-contraste');
            }

            const container = document.getElementById('grillaContainer');
            container.addEventListener('dblclick', centrarEnHoraActual);

            document.addEventListener('keydown', (e) => {
                if (e.key === 'z' || e.key === 'Z') {
                    teclaZPresionada = true;
                    e.preventDefault();
                }
            });
            document.addEventListener('keyup', (e) => {
                if (e.key === 'z' || e.key === 'Z') {
                    teclaZPresionada = false;
                }
            });
            container.addEventListener('wheel', (e) => {
                if (teclaZPresionada) {
                    e.preventDefault();
                    const delta = e.deltaY > 0 ? -0.1 : 0.1;
                    const escalaMin = obtenerEscalaMinima();
                    escalaActual = Math.min(3, Math.max(escalaMin, escalaActual + delta));
                    aplicarZoom();
                }
            }, { passive: false });
            window.addEventListener('resize', () => {
                const escalaMin = obtenerEscalaMinima();
                if (escalaActual < escalaMin) {
                    escalaActual = escalaMin;
                    aplicarZoom();
                }
            });

            cargandoProgramacion = false;
        }

        document.getElementById('btnCotizacion').addEventListener('click', function(e) {
            e.stopPropagation();
            const panel = document.getElementById('panelCotizacion');
            panel.classList.toggle('mostrar');
        });
        document.addEventListener('click', function(e) {
            const dropdown = document.getElementById('dropdownCotizacion');
            if (!dropdown.contains(e.target)) {
                document.getElementById('panelCotizacion').classList.remove('mostrar');
            }
        });
        document.getElementById('botonModo').addEventListener('click', alternarModo);
        document.getElementById('botonAC').addEventListener('click', alternarAltoContraste);
        cargarProgramacion();
    </script>
</body>
</html>
