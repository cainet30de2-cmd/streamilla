<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grilla TV - 24 horas + YouTube</title>

<style>
:root {
    --bg-body: #111;
    --bg-grilla: #000;
    --bg-encabezado: #222;
    --bg-canal: #181818;
    --bg-reproductor: #000;
    --texto: white;
    --borde: #333;
    --borde-grilla: #555;
    --sombra: rgba(0,0,0,0.8);
    --linea-tiempo: red;
}

body.modo-claro {
    --bg-body: #f5f5f5;
    --bg-grilla: #fff;
    --bg-encabezado: #e0e0e0;
    --bg-canal: #f0f0f0;
    --bg-reproductor: #e0e0e0;
    --texto: #111;
    --borde: #ccc;
    --borde-grilla: #999;
    --sombra: rgba(0,0,0,0.2);
    --linea-tiempo: #d00;
}

/* Modo alto contraste */
body.alto-contraste {
    --bg-body: #000;
    --bg-grilla: #000;
    --bg-encabezado: #000;
    --bg-canal: #000;
    --bg-reproductor: #000;
    --texto: #fff;
    --borde: #fff;
    --borde-grilla: #ff0;
    --sombra: none;
    --linea-tiempo: #ff0;
}

body.alto-contraste .programa {
    border: 2px solid #fff;
    text-shadow: none;
    box-shadow: none;
    background: #000 !important;
    color: #fff;
}

body.alto-contraste .programa:hover {
    outline: 2px solid #ff0;
    box-shadow: 0 0 15px #ff0;
}

body.alto-contraste .linea-tiempo {
    background: #ff0;
}

body.alto-contraste .error-reproductor a {
    color: #ff0;
}

body.alto-contraste .dropdown-cotizacion .panel-cotizacion {
    border-color: #ff0;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: var(--bg-body);
    color: var(--texto);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    transition: background 0.3s, color 0.3s;
}

.reproductor-container {
    flex: 0 0 50vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: var(--bg-reproductor);
    border-bottom: 2px solid var(--borde-grilla);
    position: relative;
    transition: background 0.3s, border-color 0.3s;
}

.reproductor-container iframe {
    width: 60%;
    height: 90%;
    border-radius: 12px;
    box-shadow: 0 0 20px var(--sombra);
}

.overlay-reproductor {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    z-index: 20;
    text-align: center;
    padding: 20px;
    transition: opacity 0.4s ease;
    pointer-events: none;
}

.overlay-reproductor.oculto {
    opacity: 0;
    pointer-events: none;
}

.overlay-reproductor .mensaje-principal {
    font-size: clamp(28px, 6vw, 64px);
    font-weight: bold;
    text-shadow: 0 0 30px rgba(0,0,0,0.9);
}

.overlay-reproductor .sub-mensaje {
    font-size: clamp(14px, 2vw, 24px);
    opacity: 0.7;
    margin-top: 10px;
}

.error-reproductor {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--texto);
    background: rgba(0,0,0,0.8);
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border-radius: 12px;
    z-index: 25;
}

.error-reproductor a {
    color: var(--linea-tiempo);
    text-decoration: underline;
    font-size: 18px;
}

.contenedor-grilla {
    flex: 1 1 auto;
    height: 50vh;
    overflow: hidden;
    border: 2px solid var(--borde-grilla);
    border-radius: 12px;
    background: var(--bg-grilla);
    box-shadow: 0 0 20px var(--sombra);
    transition: background 0.3s, border-color 0.3s;
    margin: 5px;
    position: relative;
    display: flex;
    flex-direction: column;
}

.grilla-container {
    flex: 1;
    overflow: auto;
    position: relative;
    display: flex;
}

.columna-canales {
    position: sticky;
    left: 0;
    z-index: 10;
    background: var(--bg-canal);
    width: 220px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--borde);
}

.canal-nombre {
    height: 110px;
    display: flex;
    align-items: center;
    padding-left: 15px;
    font-weight: bold;
    border-bottom: 1px solid var(--borde);
    background: var(--bg-canal);
    justify-content: flex-start;
}

.encabezado-canal {
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    background: var(--bg-encabezado);
    border-bottom: 1px solid var(--borde);
    position: sticky;
    top: 0;
    z-index: 12;
}

.grilla-wrapper {
    flex: 1;
    overflow: visible;
    height: fit-content;
}

.grilla {
    display: grid;
    grid-template-columns: repeat(48, 90px);
    grid-template-rows: 70px repeat(50, 110px);
    width: max-content;
    position: relative;
}

.celda {
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--borde);
    padding: 0;
    margin: 0;
    overflow: visible;
    transition: border-color 0.3s;
}

.encabezado {
    background: var(--bg-encabezado);
    font-weight: bold;
    position: sticky;
    top: 0;
    z-index: 11;
    transition: background 0.3s;
}

.programa {
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
    z-index: 2;
    box-sizing: border-box;
    overflow: hidden;
    text-align: center;
    padding: 4px 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    border: 1px solid rgba(255,255,255,0.2);
    text-shadow: 0 0 6px var(--sombra);
    box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    white-space: normal;
    word-break: break-word;
}

.programa:hover {
    transform: scale(1.03);
    box-shadow: 0 0 18px rgba(255, 255, 255, 0.4);
    z-index: 5;
}

.programa div {
    pointer-events: none;
}

.programa .titulo {
    font-weight: bold;
    font-size: 1.3em;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
}
.programa .presentadores {
    font-size: 0.9em;
    opacity: 0.85;
    margin: 1px 0;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
}
.programa .horario {
    font-size: 0.85em;
    opacity: 0.9;
}

.linea-tiempo {
    position: absolute;
    top: 0;
    width: 2px;
    height: 100%;
    background: var(--linea-tiempo);
    z-index: 6;
    pointer-events: none;
    opacity: 0.9;
    transition: background 0.3s;
}

.reloj {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 100;
    padding: 8px 20px;
    background: var(--bg-encabezado);
    color: var(--texto);
    border: 2px solid var(--borde-grilla);
    border-radius: 20px;
    font-size: 24px;
    font-weight: bold;
    box-shadow: 0 2px 8px var(--sombra);
    transition: all 0.3s;
    letter-spacing: 2px;
}

.clima {
    position: fixed;
    top: 60px;
    left: 10px;
    z-index: 100;
    padding: 6px 15px;
    background: var(--bg-encabezado);
    color: var(--texto);
    border: 2px solid var(--borde-grilla);
    border-radius: 20px;
    font-size: 16px;
    box-shadow: 0 2px 8px var(--sombra);
    transition: all 0.3s;
    display: flex;
    align-items: center;
    gap: 8px;
}

.boton-modo {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 100;
    padding: 8px 15px;
    border: 2px solid var(--borde-grilla);
    background: var(--bg-encabezado);
    color: var(--texto);
    border-radius: 20px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s;
    box-shadow: 0 2px 8px var(--sombra);
}

.boton-modo:hover {
    transform: scale(1.05);
}

/* Botón alto contraste */
.boton-ac {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 100;
    padding: 10px 18px;
    border: 2px solid var(--borde-grilla);
    background: var(--bg-encabezado);
    color: var(--texto);
    border-radius: 20px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s;
    box-shadow: 0 2px 8px var(--sombra);
    font-size: 18px;
}

.boton-ac:hover {
    transform: scale(1.05);
}

.dropdown-cotizacion {
    position: fixed;
    top: 60px;
    right: 10px;
    z-index: 100;
}

.dropdown-cotizacion .btn-dropdown {
    padding: 8px 18px;
    border: 2px solid var(--borde-grilla);
    background: var(--bg-encabezado);
    color: var(--texto);
    border-radius: 20px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s;
    box-shadow: 0 2px 8px var(--sombra);
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
}

.dropdown-cotizacion .btn-dropdown:hover {
    transform: scale(1.05);
}

.dropdown-cotizacion .panel-cotizacion {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    min-width: 300px;
    max-width: 450px;
    max-height: 65vh;
    overflow-y: auto;
    background: var(--bg-encabezado);
    color: var(--texto);
    border: 2px solid var(--borde-grilla);
    border-radius: 16px;
    padding: 14px 18px;
    box-shadow: 0 8px 24px var(--sombra);
    font-size: 14px;
    line-height: 1.7;
    white-space: normal;
    transition: all 0.3s;
    text-align: left;
}

.dropdown-cotizacion .panel-cotizacion.mostrar {
    display: block;
}

.dropdown-cotizacion .panel-cotizacion .cotizacion-item {
    border-bottom: 1px solid var(--borde);
    padding: 4px 0;
}
.dropdown-cotizacion .panel-cotizacion .cotizacion-item:last-child {
    border-bottom: none;
}

.error-grilla {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: var(--texto);
    background: var(--bg-grilla);
    text-align: center;
    padding: 20px;
    font-size: clamp(32px, 10vw, 80px);
}

.dropdown-cotizacion .panel-cotizacion::-webkit-scrollbar {
    width: 6px;
}
.dropdown-cotizacion .panel-cotizacion::-webkit-scrollbar-track {
    background: var(--bg-body);
    border-radius: 8px;
}
.dropdown-cotizacion .panel-cotizacion::-webkit-scrollbar-thumb {
    background: var(--borde-grilla);
    border-radius: 8px;
}
</style>
</head>

function nombreACanal(valor) {
    const str = String(valor).trim();
    const lower = str.toLowerCase();
    if (nombresACanal[lower] !== undefined) return nombresACanal[lower];
    const matchCanal = lower.match(/^canal\s*(\d+)$/);
    if (matchCanal) {
        const num = parseInt(matchCanal[1], 10);
        if (num >= 1 && num <= 50) return num;
    }
    const num = parseInt(str, 10);
    if (!isNaN(num) && num >= 1 && num <= 50) return num;
    return null;
}

let lineaTiempo = null;
let intervaloActualizacion = null;
let horaActualGlobal = 0;
let minutosActualGlobal = 0;

let escalaActual = 1;

const weatherCodeMap = {

    45: "🌫️", 48: "🌫️",

    95: "⛈️", 96: "⛈️", 99: "⛈️"
};

function obtenerClima() {
    const climaDiv = document.getElementById('clima');
    if (!navigator.geolocation) {
        climaDiv.innerHTML = '🌡️ N/A';
        return;
    }
    navigator.geolocation.getCurrentPosition(async (pos) => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        try {
            const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
            if (!response.ok) throw new Error("Error de red");
            const data = await response.json();
            const temp = data.current_weather.temperature;
            const code = data.current_weather.weathercode;
            const desc = weatherCodeMap[code] || 'Desconocido';
            const emoji = weatherEmojiMap[code] || '🌈';
            climaDiv.innerHTML = `${emoji} ${temp}°C - ${desc}`;
        } catch (error) {
            climaDiv.innerHTML = '🌡️ N/A';
        }
    }, (error) => {
        climaDiv.innerHTML = '🌡️ N/A';
    }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 600000 });
}

function obtenerCotizacion() {
    const contenido = document.getElementById('contenidoCotizacion');
    contenido.innerHTML = 'Cargando...';

    fetch('https://dolarapi.com/v1/dolares')
        .then(response => response.json())
        .then(data => {
            let texto = '';
            data.forEach(item => {
                const nombre = item.nombre || item.casa || 'Desconocido';
                const compra = item.compra !== undefined ? item.compra.toFixed(2) : 'N/D';
                const venta = item.venta !== undefined ? item.venta.toFixed(2) : 'N/D';
                texto += `<div class="cotizacion-item">${nombre}: Compra $${compra} | Venta $${venta}</div>`;
            });

            return fetch('https://dolarapi.com/v1/cotizaciones')
                .then(response => response.json())
                .then(cotizaciones => {
                    function buscarCotizacion(nombres) {
                        return cotizaciones.find(item => {
                            const nombre = (item.nombre || '').toLowerCase();
                            const casa = (item.casa || '').toLowerCase();
                            return nombres.some(n => nombre.includes(n) || casa.includes(n));
                        });
                    }

                    const euro = buscarCotizacion(['euro']);
                    const real = buscarCotizacion(['real', 'brasil']);

                    if (euro) texto += `<div class="cotizacion-item">Euro: Compra € ${euro.compra.toFixed(2)} | Venta € ${euro.venta.toFixed(2)}</div>`;
                    if (real) texto += `<div class="cotizacion-item">Real: Compra R$ ${real.compra.toFixed(2)} | Venta R$ ${real.venta.toFixed(2)}</div>`;

                    if (texto === '') texto = 'Cotización no disponible';
                    contenido.innerHTML = texto;
                });
        })
        .catch(() => {
            contenido.textContent = 'Cotización no disponible';
        });
}

function extraerIDYouTube(url) {
    if (!url) return null;
    const patrones = [
        /(?:https?:\/\/)?(?:www\.)?youtube\.com\/watch\?v=([^&\s]+)/,
        /(?:https?:\/\/)?(?:www\.)?youtu\.be\/([^?\s]+)/,
        /(?:https?:\/\/)?(?:www\.)?youtube\.com\/embed\/([^/?\s]+)/,
        /(?:https?:\/\/)?(?:www\.)?youtube\.com\/live\/([^/?\s]+)/,
        /(?:https?:\/\/)?(?:www\.)?youtube\.com\/shorts\/([^/?\s]+)/,
        /(?:https?:\/\/)?(?:m\.)?youtube\.com\/watch\?v=([^&\s]+)/
    ];
    for (const patron of patrones) {
        const match = url.match(patron);
        if (match) return match[1];
    }
    return null;
}

function mostrarOverlay(mensaje, subMensaje = '') {
    const overlay = document.getElementById('overlayReproductor');
    overlay.querySelector('.mensaje-principal').textContent = mensaje;
    overlay.querySelector('.sub-mensaje').textContent = subMensaje;
    overlay.classList.remove('oculto');
}

function ocultarOverlay() {
    document.getElementById('overlayReproductor').classList.add('oculto');
}

function mostrarNoDisponible() {
    mostrarOverlay('Transmisión no disponible', 'Este programa no tiene un enlace disponible');
}

function mostrarErrorReproductor(url) {
    document.getElementById('youtubePlayer').style.display = 'none';
    const errorDiv = document.getElementById('errorReproductor');
    errorDiv.style.display = 'flex';
    document.getElementById('linkVerYouTube').href = url;
    mostrarOverlay('Transmisión en vivo no disponible', 'El enlace no pudo ser cargado');
}

function ocultarErrorReproductor() {
    document.getElementById('youtubePlayer').style.display = '';
    document.getElementById('errorReproductor').style.display = 'none';
}

function reproducirVideo(url) {
    const iframe = document.getElementById('youtubePlayer');
    ocultarErrorReproductor();
    const videoID = extraerIDYouTube(url);
    if (videoID) {
        urlActualYoutube = url;
        iframe.src = `https://www.youtube-nocookie.com/embed/${videoID}?autoplay=1&mute=0&enablejsapi=1`;
        ocultarOverlay();
    } else {
        mostrarOverlay('Transmisión en vivo no disponible', 'El enlace no es un video de YouTube válido');
        mostrarErrorReproductor(url);
    }
}

window.addEventListener('message', (event) => {
    if (event.origin !== 'https://www.youtube-nocookie.com' && event.origin !== 'https://www.youtube.com') return;
    try {
        const data = JSON.parse(event.data);
        if (data.event === 'error' || data.error) {
            mostrarErrorReproductor(urlActualYoutube);
        }
    } catch (e) {}
});

function actualizarReloj(hora, minutos) {
    if (!elementoReloj) elementoReloj = document.getElementById('reloj');
    if (elementoReloj) {
        elementoReloj.textContent = `${hora.toString().padStart(2,'0')}:${minutos.toString().padStart(2,'0')}`;
    }
}

function crearLineaTiempo() {
    if (!lineaTiempo) {
        lineaTiempo = document.createElement('div');
        lineaTiempo.className = 'linea-tiempo';
        document.getElementById('grilla').appendChild(lineaTiempo);
    }
}

function actualizarLineaTiempo(hora, minutos) {
    if (!lineaTiempo) return;
    const anchoMediaHoraBase = 90;
    const left = (hora + minutos / 60) * anchoMediaHoraBase * 2 * escalaActual;
    lineaTiempo.style.left = left + 'px';
    horaActualGlobal = hora;
    minutosActualGlobal = minutos;
    actualizarReloj(hora, minutos);
}

function centrarEnHoraActual() {
    const container = document.getElementById('grillaContainer');
    const columnaCanales = document.getElementById('columnaCanales');
    const anchoMediaHoraBase = 90;
    const anchoHoraBase = anchoMediaHoraBase * 2 * escalaActual;
    const offsetCanales = columnaCanales.offsetWidth;
    const horaPos = (horaActualGlobal + minutosActualGlobal / 60) * anchoHoraBase;
    const scrollLeft = horaPos + offsetCanales - container.clientWidth / 2;
    container.scrollTo({
        left: Math.max(0, scrollLeft),
        behavior: 'smooth'
    });
}

// Ajuste inteligente de texto proporcional al ancho del bloque y longitud del título
function ajustarTextoProgramas() {
    document.querySelectorAll('.programa').forEach(prog => {
        const titulo = prog.querySelector('.titulo');
        if (!titulo) return;
        
        const blockWidth = prog.clientWidth;
        const titleText = titulo.textContent;
        const titleLength = titleText.length;
        
        // Tamaño de fuente ideal para que el título quepa en una línea (factor 0.55 para Arial)
        const idealFontSize = Math.min(12 * escalaActual, blockWidth / (titleLength * 0.55));
        const minFontSize = 6;
        const startSize = Math.max(minFontSize, Math.min(12 * escalaActual, idealFontSize));
        
        prog.style.fontSize = startSize + 'px';
        
        // Reducir si aún desborda
        let intentos = 0;
        while (titulo.scrollWidth > titulo.clientWidth && intentos < 20) {
            const currentSize = parseFloat(prog.style.fontSize);
            if (currentSize <= minFontSize) break;
            prog.style.fontSize = (currentSize - 0.5) + 'px';
            intentos++;
        }
    });
}

function aplicarZoom() {
    const grilla = document.getElementById('grilla');
    const columnaCanales = document.getElementById('columnaCanales');
    if (!grilla || !columnaCanales) return;

    const columnasTiempo = 48;
    const anchoColumna = 90 * escalaActual;
    grilla.style.gridTemplateColumns = `repeat(${columnasTiempo}, ${anchoColumna}px)`;
    grilla.style.gridTemplateRows = `${70 * escalaActual}px repeat(50, ${110 * escalaActual}px)`;

    document.querySelectorAll('.linea-divisoria').forEach(div => {
        div.style.width = anchoColumna + 'px';
        div.style.flexBasis = anchoColumna + 'px';
    });

    const fontSizeEncabezado = 16 * escalaActual;
    document.querySelectorAll('.grilla .encabezado').forEach(encabezado => {
        encabezado.style.fontSize = fontSizeEncabezado + 'px';
    });

    const anchoHora = anchoColumna * 2;
    const alturaFila = 110 * escalaActual;
    document.querySelectorAll('.programa').forEach(prog => {
        const inicio = parseFloat(prog.dataset.inicio);
        const duracion = parseFloat(prog.dataset.duracion);
        const pista = parseInt(prog.dataset.pista);
        const numPistas = parseInt(prog.dataset.numpistas);
        const alturaPorPista = numPistas > 0 ? alturaFila / numPistas : alturaFila;

        prog.style.left = (inicio * anchoHora) + 'px';
        prog.style.width = ((duracion + 0.5) * anchoHora) + 'px';
        prog.style.top = (pista * alturaPorPista) + 'px';
        prog.style.height = alturaPorPista + 'px';
        prog.style.fontSize = (12 * escalaActual) + 'px';
    });

    grilla.querySelectorAll('.celda:not(.encabezado)').forEach(row => {
        row.style.height = `${alturaFila}px`;
    });

    const nuevoAnchoColumna = 220 * escalaActual;
    const nuevaAlturaEncabezado = 70 * escalaActual;
    const nuevaAlturaFila = 110 * escalaActual;
    const alturaTotal = (70 + 50 * 110) * escalaActual;
    const fontSizeEscalada = 16 * escalaActual;

    columnaCanales.style.width = nuevoAnchoColumna + 'px';
    columnaCanales.style.height = alturaTotal + 'px';

    const encabezadoCanal = columnaCanales.querySelector('.encabezado-canal');
    if (encabezadoCanal) {
        encabezadoCanal.style.height = nuevaAlturaEncabezado + 'px';
        encabezadoCanal.style.fontSize = fontSizeEscalada + 'px';
    }

    columnaCanales.querySelectorAll('.canal-nombre').forEach(nombre => {
        nombre.style.height = nuevaAlturaFila + 'px';
        nombre.style.fontSize = fontSizeEscalada + 'px';
    });

    actualizarLineaTiempo(horaActualGlobal, minutosActualGlobal);
    centrarEnHoraActual();
    
    // Ajuste inteligente de textos después de dimensionar los bloques
    ajustarTextoProgramas();
}

function iniciarActualizacionAutomatica() {
    if (intervaloActualizacion) clearInterval(intervaloActualizacion);
    function actualizar() {
        // Verificar cambio de día antes de actualizar hora
        verificarCambioDia();

        const ahora = new Date();
        actualizarLineaTiempo(ahora.getHours(), ahora.getMinutes());
    }
    actualizar();
    const ahora = new Date();
    const msHastaProximoMinuto = (60 - ahora.getSeconds()) * 1000 - ahora.getMilliseconds();
    setTimeout(() => {
        actualizar();
        intervaloActualizacion = setInterval(actualizar, 60000);
    }, msHastaProximoMinuto);
}

function horaADecimal(valor) {
    if (typeof valor === 'number') return valor;
    const str = String(valor).trim();
    if (str.includes(':')) {
        const partes = str.split(':');
        const horas = parseInt(partes[0], 10) || 0;
        const minutos = parseInt(partes[1], 10) || 0;
        return horas + minutos / 60;
    }
    return parseFloat(str);
}

function parseCSV(texto) {
    const lineas = texto.split(/\r?\n/);
    const datos = [];
    let inicioDatos = 0;
    const primera = lineas[0].trim().toLowerCase();
    if (primera.startsWith('canal') && primera.includes('horainicio')) inicioDatos = 1;
    for (let i = inicioDatos; i < lineas.length; i++) {
        const linea = lineas[i].trim();
        if (linea === '') continue;
        const partes = [];
        let actual = '';
        let entreComillas = false;
        for (let j = 0; j < linea.length; j++) {
            const ch = linea[j];
            if (ch === '"') {
                entreComillas = !entreComillas;
            } else if (ch === ',' && !entreComillas) {
                partes.push(actual.trim());
                actual = '';
            } else {
                actual += ch;
            }
        }
        partes.push(actual.trim());
        if (partes.length < 5) continue;
        const canalNombre = partes[0];
        const canal = nombreACanal(canalNombre);
        if (canal === null || canal < 1 || canal > 50) continue;
        const horaInicio = horaADecimal(partes[1]);
        if (isNaN(horaInicio)) continue;
        let duracion;
        const duracionRaw = partes[2];
        if (duracionRaw.toLowerCase().startsWith('fin:')) {
            const horaFinStr = duracionRaw.substring(4).trim();
            const horaFinDecimal = horaADecimal(horaFinStr);
            if (isNaN(horaFinDecimal)) continue;
            duracion = horaFinDecimal - horaInicio;
            if (duracion < 0) duracion += 24;
        } else {
            duracion = horaADecimal(duracionRaw);
        }
        if (isNaN(duracion) || duracion <= 0) continue;
        const titulo = partes[3].replace(/^"|"$/g, '');
        if (!titulo) continue;
        const presentadores = partes[4].replace(/^"|"$/g, '');
        const programa = { canal, horaInicio, duracion, titulo, presentadores };
        if (partes.length >= 6 && partes[5] !== '') programa.color = partes[5];
        if (partes.length >= 7 && partes[6] !== '') programa.url = partes[6];
        datos.push(programa);
    }
    return datos;
}

function mostrarErrorGrilla() {
    document.getElementById('grilla').innerHTML = `<div class="error-grilla">Sin Programación</div>`;
    document.getElementById('columnaCanales').innerHTML = '';
}

function renderizarGrilla(datos, horaActual, minutosActual) {
    const grilla = document.getElementById("grilla");
    const columnaCanales = document.getElementById("columnaCanales");
    grilla.innerHTML = "";
    columnaCanales.innerHTML = "";

    const canales = 50;
    const anchoMediaHoraBase = 90;
    const anchoHoraBase = anchoMediaHoraBase * 2;
    const alturaFila = 110;
    const mediaHoras = 48;
    const EPSILON = 0.001;

    const programasPorCanal = {};
    for (let c = 1; c <= canales; c++) programasPorCanal[c] = [];

    datos.forEach(prog => {
        const canal = prog.canal;
        if (canal < 1 || canal > canales) return;
        const inicio = parseFloat(prog.horaInicio);
        const duracion = parseFloat(prog.duracion);
        if (isNaN(inicio) || isNaN(duracion) || inicio < 0) return;
        const fin = inicio + duracion;
        if (fin > 24) {
            const duracion1 = 24 - inicio;
            if (duracion1 > 0) {
                programasPorCanal[canal].push({...prog, inicio, duracion: duracion1, fin: 24});
            }
            const duracion2 = fin - 24;
            if (duracion2 > 0) {
                programasPorCanal[canal].push({...prog, inicio: 0, duracion: duracion2, fin: duracion2});
            }
        } else {
            programasPorCanal[canal].push({...prog, inicio, duracion, fin});
        }
    });

    const pistasPorCanal = {};
    for (let c = 1; c <= canales; c++) {
        const programas = programasPorCanal[c];
        programas.sort((a, b) => a.inicio - b.inicio);
        const pistas = [];
        const asignacion = [];
        programas.forEach(prog => {
            let pistaAsignada = -1;
            for (let i = 0; i < pistas.length; i++) {
                let pistaFin = pistas[i];
                if (pistaFin >= 24) pistaFin -= 24;
                if (pistaFin <= prog.inicio || Math.abs(pistaFin - prog.inicio) < EPSILON) {
                    pistaAsignada = i;
                    break;
                }
            }
            if (pistaAsignada === -1) {
                pistaAsignada = pistas.length;
                pistas.push(prog.fin);
            } else {
                pistas[pistaAsignada] = prog.fin;
            }
            asignacion.push({ programa: prog, pista: pistaAsignada });
        });
        pistasPorCanal[c] = { asignacion, numPistas: pistas.length };
    }

    let canalesHTML = '<div class="encabezado-canal"></div>';
    for (let canal = 1; canal <= canales; canal++) {
        let nombre = "Canal " + canal;
        if (canal === 1) nombre = "Gelatina";
        else if (canal === 2) nombre = "Telefe";
        else if (canal === 3) nombre = "TN";
        else if (canal === 4) nombre = "ESPN";
        else if (canal === 5) nombre = "Fox Sports";
        else if (canal === 6) nombre = "Disney Channel";
        else if (canal === 7) nombre = "Cartoon Network";
        else if (canal === 8) nombre = "Warner";
        else if (canal === 9) nombre = "HBO";
        else if (canal === 10) nombre = "Cinecanal";
        canalesHTML += `<div class="canal-nombre">${nombre}</div>`;
    }
    columnaCanales.innerHTML = canalesHTML;

    let grillaHTML = '';
    for (let m = 0; m < mediaHoras; m++) {
        const hora = Math.floor(m / 2);
        const minuto = m % 2 === 0 ? '00' : '30';
        grillaHTML += `<div class="celda encabezado">${hora.toString().padStart(2,"0")}:${minuto}</div>`;
    }

    for (let canal = 1; canal <= canales; canal++) {
        const info = pistasPorCanal[canal] || { asignacion: [], numPistas: 0 };
        const { asignacion, numPistas } = info;
        const alturaPorPista = numPistas > 0 ? alturaFila / numPistas : alturaFila;

        let contenedorHtml = `<div class="celda" style="grid-column: 1 / -1; position: relative; padding:0; overflow:visible; height:${alturaFila}px;">`;
        contenedorHtml += `<div style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; display:flex; flex-direction:row;">`;
        for (let m = 0; m < mediaHoras; m++) {
            contenedorHtml += `<div class="linea-divisoria" style="border-left:1px solid var(--borde); height:100%; width:${anchoMediaHoraBase}px; flex-shrink:0; margin-left:-0.03px;"></div>`;
        }
        contenedorHtml += `</div>`;

        asignacion.forEach(({ programa, pista }) => {
            const { titulo, presentadores, inicio, fin, duracion, color, url } = programa;
            const colorFondo = color || "#444";
            const left = inicio * anchoHoraBase;
            const width = duracion * anchoHoraBase;
            const top = pista * alturaPorPista;
            const height = alturaPorPista;

            const tieneURL = url && url.trim() !== '';
            const esYouTube = tieneURL && extraerIDYouTube(url);

            let onclickAttr;
            if (tieneURL) {
                if (esYouTube) {
                    onclickAttr = `onclick="reproducirVideo('${url.replace(/'/g, "\\'")}')"`;
                } else {
                    onclickAttr = `onclick="window.open('${url.replace(/'/g, "\\'")}', '_blank')"`;
                }
            } else {
                onclickAttr = `onclick="mostrarNoDisponible()"`;
            }

            const inicioHoras = Math.floor(inicio);
            const inicioMinutos = Math.round((inicio - inicioHoras) * 60);
            const finHoras = Math.floor(fin);
            const finMinutos = Math.round((fin - finHoras) * 60);
            const inicioStr = `${inicioHoras.toString().padStart(2,"0")}:${inicioMinutos.toString().padStart(2,"0")}`;
            const finStr = `${finHoras.toString().padStart(2,"0")}:${finMinutos.toString().padStart(2,"0")}`;

            const presentadoresHtml = presentadores
                ? `<div class="presentadores">${presentadores}</div>`
                : '';

            contenedorHtml += `
                <div class="programa" style="position:absolute; left:${left}px; top:${top}px; width:${width}px; height:${height}px; background:${colorFondo};" 
                     data-inicio="${inicio}" data-duracion="${duracion}" data-pista="${pista}" data-numpistas="${numPistas}" ${onclickAttr}>
                    <div class="titulo">${titulo}</div>
                    ${presentadoresHtml}
                    <div class="horario">${inicioStr} - ${finStr}</div>
                </div>
            `;
        });

        contenedorHtml += `</div>`;
        grillaHTML += contenedorHtml;
    }

    grilla.innerHTML = grillaHTML;

    crearLineaTiempo();
    actualizarLineaTiempo(horaActual, minutosActual);
    aplicarZoom();

    mostrarOverlay('Seleccione un programa', 'Haga clic en cualquier programa de la grilla');
}

function alternarModo() {
    const body = document.body;
    const boton = document.getElementById('botonModo');
    if (body.classList.contains('modo-oscuro')) {
        body.classList.remove('modo-oscuro');
        body.classList.add('modo-claro');
        boton.innerHTML = '🌙 Modo Oscuro';
    } else {
        body.classList.remove('modo-claro');
        body.classList.add('modo-oscuro');
        boton.innerHTML = '☀️ Modo Claro';
    }
}

function alternarAltoContraste() {
    const body = document.body;
    body.classList.toggle('alto-contraste');
    if (body.classList.contains('alto-contraste')) {
        localStorage.setItem('altoContraste', 'true');
    } else {
        localStorage.removeItem('altoContraste');
    }
}

// Función para calcular la escala mínima que permite ver toda la grilla (00:00 a 23:30)
function obtenerEscalaMinima() {
    const container = document.getElementById('grillaContainer');
    if (!container) return 0.3;
    const anchoDisponible = container.clientWidth;
    // Ancho total de la grilla: columna de canales (220) + 48 medias horas * 90px
    const anchoTotalBase = 220 + 48 * 90; // = 4540
    // Escala para que entre justo: anchoDisponible / anchoTotalBase
    // Dejamos un pequeño margen de 10px para evitar scroll horizontal imprevisto
    const escala = (anchoDisponible - 10) / anchoTotalBase;
    return Math.max(0.2, Math.min(1, escala)); // Mínimo 0.2 para que no sea invisible, máximo 1 para que no haga zoom out de más
}

/* ---------------- DETECCIÓN DE CAMBIO DE DÍA ---------------- */
function verificarCambioDia() {
    if (cargandoProgramacion) return;

    // Obtenemos la fecha actual en zona horaria de Argentina usando Intl
    const ahora = new Date();
    const formateador = new Intl.DateTimeFormat('es-AR', {
        timeZone: 'America/Argentina/Buenos_Aires',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
    });
    const partes = formateador.formatToParts(ahora);
    const dia = partes.find(p => p.type === 'day').value;
    const mes = partes.find(p => p.type === 'month').value;
    const anio = partes.find(p => p.type === 'year').value;
    const fechaActualStr = `${anio}-${mes}-${dia}`;

    if (ultimaFechaCargaStr && fechaActualStr !== ultimaFechaCargaStr) {
        console.log(`Cambio de día detectado: ${ultimaFechaCargaStr} → ${fechaActualStr}. Recargando programación...`);
        cargarProgramacion();
    }
}

async function cargarProgramacion() {
    if (cargandoProgramacion) return;
    cargandoProgramacion = true;

    let hora, minutos, dia, mes, anio;
    try {
        const response = await fetch('https://worldtimeapi.org/api/timezone/America/Argentina/Buenos_Aires');
        const data = await response.json();
        const datetime = new Date(data.datetime);
        hora = datetime.getHours();
        minutos = datetime.getMinutes();
        dia = datetime.getDate();
        mes = datetime.getMonth();
        anio = datetime.getFullYear();
    } catch (error) {
        const ahora = new Date();
        hora = ahora.getHours();
        minutos = ahora.getMinutes();
        dia = ahora.getDate();
        mes = ahora.getMonth();
        anio = ahora.getFullYear();
    }

    // Guardamos la fecha de carga en formato YYYY-MM-DD
    ultimaFechaCargaStr = `${anio}-${String(mes + 1).padStart(2, '0')}-${String(dia).padStart(2, '0')}`;

    const nombreMes = meses[mes];
    const ruta = `./Programación/${nombreMes}/${dia}.csv`;

    let datos;
    try {
        const respuesta = await fetch(ruta);
        if (!respuesta.ok) throw new Error(`HTTP ${respuesta.status}`);
        const texto = await respuesta.text();
        datos = parseCSV(texto);
        if (datos.length === 0) throw new Error("Archivo vacío o sin programas válidos");
        console.log(`Programación cargada desde ${ruta}`);
    } catch (error) {
        console.warn(`No se pudo cargar ${ruta}, usando datos de ejemplo.`, error);
        datos = programacionEjemplo;
    }

    if (datos) {
        // Antes de renderizar, ajustamos la escala inicial para que entre toda la grilla si es necesario
        const escalaMin = obtenerEscalaMinima();
        if (escalaActual > 1) escalaActual = 1; // no forzamos zoom in
        if (escalaActual < escalaMin) escalaActual = escalaMin;
        renderizarGrilla(datos, hora, minutos);
        iniciarActualizacionAutomatica();
    } else {
        mostrarErrorGrilla();
    }

    obtenerClima();
    obtenerCotizacion();

    if (localStorage.getItem('altoContraste') === 'true') {
        document.body.classList.add('alto-contraste');
    }

    const container = document.getElementById('grillaContainer');
    container.addEventListener('dblclick', centrarEnHoraActual);

    document.addEventListener('keydown', (e) => {
        if (e.key === 'z' || e.key === 'Z') {
            teclaZPresionada = true;
            e.preventDefault();
        }
    });

    document.addEventListener('keyup', (e) => {
        if (e.key === 'z' || e.key === 'Z') {
            teclaZPresionada = false;
        }
    });

    container.addEventListener('wheel', (e) => {
        if (teclaZPresionada) {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.1 : 0.1;
            const escalaMin = obtenerEscalaMinima();
            escalaActual = Math.min(3, Math.max(escalaMin, escalaActual + delta));
            aplicarZoom();
        }
    }, { passive: false });

    window.addEventListener('resize', () => {
        const escalaMin = obtenerEscalaMinima();
        if (escalaActual < escalaMin) {
            escalaActual = escalaMin;
            aplicarZoom();
        }
    });

    cargandoProgramacion = false;
}

document.getElementById('btnCotizacion').addEventListener('click', function(e) {
    e.stopPropagation();
    const panel = document.getElementById('panelCotizacion');
    panel.classList.toggle('mostrar');
});

document.addEventListener('click', function(e) {
    const dropdown = document.getElementById('dropdownCotizacion');
    if (!dropdown.contains(e.target)) {
        document.getElementById('panelCotizacion').classList.remove('mostrar');
    }
});

document.getElementById('botonModo').addEventListener('click', alternarModo);
document.getElementById('botonAC').addEventListener('click', alternarAltoContraste);
cargarProgramacion();
